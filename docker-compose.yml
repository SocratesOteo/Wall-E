services:
  # ── Wall-E Brain (Python orchestrator) ──────────────────────────────────────
  wall-e-brain:
    build:
      context: .
      dockerfile: Dockerfile.brain
    ports:
      - "8000:8000"    # ADK web UI + API
    environment:
      - WALL_E_MODEL=${WALL_E_MODEL:-openrouter/qwen/qwen3-coder}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TOGETHERAI_API_KEY=${TOGETHERAI_API_KEY:-}
      - WALL_E_PROJECT_ROOT=/workspace
      - WALL_E_TS_AGENT_URL=http://ts-web-agent:8001
      - WALL_E_GO_AGENT_URL=http://go-build-agent:8002
      - WALL_E_COMMAND_TIMEOUT=60
    volumes:
      - ${PROJECT_PATH:-./}:/workspace   # Mount your project into the container
      - ./brain:/app/brain
    depends_on:
      - ts-web-agent
      - go-build-agent
    restart: unless-stopped

  # ── TypeScript Web Sub-Agent ─────────────────────────────────────────────────
  ts-web-agent:
    build:
      context: ./agents/ts-web-agent
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - WALL_E_PROJECT_ROOT=/workspace
    volumes:
      - ${PROJECT_PATH:-./}:/workspace
    restart: unless-stopped

  # ── Go Build Sub-Agent ───────────────────────────────────────────────────────
  go-build-agent:
    build:
      context: ./agents/go-build-agent
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - WALL_E_PROJECT_ROOT=/workspace
    volumes:
      - ${PROJECT_PATH:-./}:/workspace
    restart: unless-stopped
